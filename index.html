<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>共有ページ</title>

  <style>

    html, body {
      margin: 0;
      padding: 0;
      background: #f7f7f5;
      font-family: sans-serif;
    }

    #app {
      width: 100%;
      min-height: 100vh;
    }

    .loading {
      padding: 40px;
      text-align: center;
      color: #999;
    }

  </style>
</head>

<body>

  <div id="app">
    <div class="loading">
      読み込み中...
    </div>
  </div>

  <script>

    async function loadPage() {

      const query =
        window.location.search;

      const url =
        "https://script.google.com/macros/s/AKfycbyFwil-w0os6fpYoSNpUexNmwlS9dYdyRqHGRZpirKAH4VaR7uqyCL9YzXXPiJmyJIY/exec"
        + query;

      try {

        const response =
          await fetch(url);

        const html =
          await response.text();

        document.getElementById('app').innerHTML =
          html;

      } catch(err) {

        document.getElementById('app').innerHTML =
          '<div class="loading">読み込み失敗</div>';

        console.error(err);
      }
    }

    function sortTable(th, columnIndex) {

      const table = th.closest('table');
      const tbody = table.querySelector('tbody');

      const rows = Array.from(
        tbody.querySelectorAll('tr')
      );

      const currentOrder =
        th.getAttribute('data-order') || 'asc';

      const nextOrder =
        currentOrder === 'asc'
        ? 'desc'
        : 'asc';

      table.querySelectorAll('th').forEach(header => {
        header.removeAttribute('data-order');
      });

      th.setAttribute('data-order', nextOrder);

      rows.sort((a, b) => {

        const aText =
          a.children[columnIndex]
          .innerText
          .trim();

        const bText =
          b.children[columnIndex]
          .innerText
          .trim();

        const aNum = parseFloat(aText);
        const bNum = parseFloat(bText);

        const isNumber =
          !isNaN(aNum) && !isNaN(bNum);

        let result;

        if(isNumber) {
          result = aNum - bNum;
        } else {
          result = aText.localeCompare(
            bText,
            'ja'
          );
        }

        return nextOrder === 'asc'
          ? result
          : -result;
      });

      rows.forEach(row =>
        tbody.appendChild(row)
      );
    }

    loadPage();

  </script>

</body>
</html>
