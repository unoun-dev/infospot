<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>共有ページ</title>

  <style>

    html, body {
      margin: 0;
      padding: 0;
      background: #f7f7f5;
      font-family: sans-serif;
    }

    #app {
      width: 100%;
      min-height: 100vh;
    }

    .loading {
      padding: 40px;
      text-align: center;
      color: #999;
    }

  </style>
</head>

<body>

  <div id="app">
    <div class="loading">
      読み込み中...
    </div>
  </div>

  <script>

    async function loadPage() {

      const query =
        window.location.search;

      const url =
        "https://script.google.com/macros/s/AKfycbw6yosfoQhCfebOyQU-nsDRh2FMcZB3zyRz4zN45KRKiiAlLOFUw5pUYw12sX-O8oqW/exec"
        + query;

      try {

        const response =
          await fetch(url);

        const html =
          await response.text();

        document.getElementById('app').innerHTML =
          html;

      } catch(err) {

        document.getElementById('app').innerHTML =
          '<div class="loading">読み込み失敗</div>';

        console.error(err);
      }
    }

    loadPage();

  </script>

</body>
</html>
